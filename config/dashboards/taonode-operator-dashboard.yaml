apiVersion: v1
kind: ConfigMap
metadata:
  name: taonode-guardian-operator-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: taonode-guardian
    app.kubernetes.io/part-of: taonode-guardian
data:
  taonode-operator.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Observabilidade profunda do TaoNode Guardian Operator e Validators — Golden Signals, Controller Runtime, Go PPROF e Resource Usage.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 100,
          "title": "Visao Executiva (Golden Signals)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 300},
                  {"color": "green", "value": 3600}
                ]
              },
              "unit": "dtdurations"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 1},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "time() - process_start_time_seconds{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Uptime do Operator",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "blue", "value": null}]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 1},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(controller_runtime_reconcile_total{namespace=\"$namespace\", pod=~\"$pod\"})",
              "legendFormat": "Total",
              "refId": "A"
            }
          ],
          "title": "Total de Reconciliacoes",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"options": {"0": {"color": "green", "index": 0, "text": "SEM ERROS"}}, "type": "value"},
                {"options": {"from": 0.001, "result": {"color": "red", "index": 1, "text": "COM ERROS"}, "to": 9999}, "type": "range"}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 0.001}
                ]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 1},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(controller_runtime_reconcile_errors_total{namespace=\"$namespace\", pod=~\"$pod\"}[$__rate_interval]))",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "Taxa de Erro (Error Rate)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 5}
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 1},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.99, sum(rate(controller_runtime_reconcile_time_seconds_bucket{namespace=\"$namespace\", pod=~\"$pod\"}[$__rate_interval])) by (le))",
              "legendFormat": "P99",
              "refId": "A"
            }
          ],
          "title": "Latencia P99 (Reconciliacao)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never", "spanNulls": false},
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "id": 5,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(controller_runtime_reconcile_total{namespace=\"$namespace\", pod=~\"$pod\", result=\"success\"}[$__rate_interval])) by (controller)",
              "legendFormat": "OK: {{controller}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(controller_runtime_reconcile_total{namespace=\"$namespace\", pod=~\"$pod\", result=\"error\"}[$__rate_interval])) by (controller)",
              "legendFormat": "ERR: {{controller}}",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(controller_runtime_reconcile_total{namespace=\"$namespace\", pod=~\"$pod\", result=\"requeue\"}[$__rate_interval])) by (controller)",
              "legendFormat": "REQUEUE: {{controller}}",
              "refId": "C"
            }
          ],
          "title": "Taxa de Reconciliacao por Resultado (req/s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "id": 6,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.50, sum(rate(controller_runtime_reconcile_time_seconds_bucket{namespace=\"$namespace\", pod=~\"$pod\"}[$__rate_interval])) by (le, controller))",
              "legendFormat": "P50 {{controller}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.95, sum(rate(controller_runtime_reconcile_time_seconds_bucket{namespace=\"$namespace\", pod=~\"$pod\"}[$__rate_interval])) by (le, controller))",
              "legendFormat": "P95 {{controller}}",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "histogram_quantile(0.99, sum(rate(controller_runtime_reconcile_time_seconds_bucket{namespace=\"$namespace\", pod=~\"$pod\"}[$__rate_interval])) by (le, controller))",
              "legendFormat": "P99 {{controller}}",
              "refId": "C"
            }
          ],
          "title": "Latencia de Reconciliacao P50 / P95 / P99",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 13},
          "id": 101,
          "title": "Operator: Controller Runtime",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 20, "lineWidth": 2, "showPoints": "never"},
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 14},
          "id": 7,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "workqueue_depth{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "title": "Workqueue Depth (Fila de Trabalho)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 14},
          "id": 8,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "go_goroutines{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Goroutines Ativas",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "reqps",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 22},
          "id": 9,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "rate(workqueue_retries_total{namespace=\"$namespace\", pod=~\"$pod\"}[$__rate_interval])",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "title": "Workqueue Retries (taxa/s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"options": {"0": {"color": "red", "index": 0, "text": "FOLLOWER"}}, "type": "value"},
                {"options": {"1": {"color": "green", "index": 1, "text": "LEADER"}}, "type": "value"}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 22},
          "id": 10,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "leader_election_is_leader{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Leader Election",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 22},
          "id": 11,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(controller_runtime_active_workers{namespace=\"$namespace\", pod=~\"$pod\"})",
              "legendFormat": "Workers",
              "refId": "A"
            }
          ],
          "title": "Active Workers",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "blue", "value": null}]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 26},
          "id": 12,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(controller_runtime_max_concurrent_reconciles{namespace=\"$namespace\", pod=~\"$pod\"})",
              "legendFormat": "Max Concurrent",
              "refId": "A"
            }
          ],
          "title": "Max Concurrent Reconciles",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "blue", "value": null}]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 26},
          "id": 13,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "sum(rate(workqueue_adds_total{namespace=\"$namespace\", pod=~\"$pod\"}[$__rate_interval]))",
              "legendFormat": "Adds/s",
              "refId": "A"
            }
          ],
          "title": "Workqueue Adds (taxa/s)",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 30},
          "id": 102,
          "title": "Operator: Go Runtime (PPROF)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 15, "lineWidth": 2, "showPoints": "never"},
              "unit": "bytes"
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Heap Sys"},
                "properties": [
                  {"id": "custom.fillOpacity", "value": 5},
                  {"id": "color", "value": {"fixedColor": "blue", "mode": "fixed"}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Heap In-Use"},
                "properties": [{"id": "color", "value": {"fixedColor": "orange", "mode": "fixed"}}]
              },
              {
                "matcher": {"id": "byName", "options": "Heap Alloc"},
                "properties": [{"id": "color", "value": {"fixedColor": "green", "mode": "fixed"}}]
              }
            ]
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 31},
          "id": 14,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "go_memstats_heap_sys_bytes{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "Heap Sys",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "go_memstats_heap_inuse_bytes{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "Heap In-Use",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "go_memstats_heap_alloc_bytes{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "Heap Alloc",
              "refId": "C"
            }
          ],
          "title": "Heap Memory (Sys / In-Use / Alloc)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 31},
          "id": 15,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "go_gc_duration_seconds{namespace=\"$namespace\", pod=~\"$pod\", quantile=\"0.5\"}",
              "legendFormat": "GC P50 {{pod}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "go_gc_duration_seconds{namespace=\"$namespace\", pod=~\"$pod\", quantile=\"0.75\"}",
              "legendFormat": "GC P75 {{pod}}",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "go_gc_duration_seconds{namespace=\"$namespace\", pod=~\"$pod\", quantile=\"1\"}",
              "legendFormat": "GC P100 (Max) {{pod}}",
              "refId": "C"
            }
          ],
          "title": "GC Duration (P50 / P75 / Max)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 39},
          "id": 16,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "rate(process_cpu_seconds_total{namespace=\"$namespace\", pod=~\"$pod\"}[$__rate_interval])",
              "legendFormat": "CPU {{pod}}",
              "refId": "A"
            }
          ],
          "title": "CPU Usage (process_cpu_seconds_total)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 39},
          "id": 17,
          "options": {
            "legend": {"calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "process_resident_memory_bytes{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "RSS {{pod}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "process_virtual_memory_bytes{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "Virtual {{pod}}",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "go_memstats_stack_inuse_bytes{namespace=\"$namespace\", pod=~\"$pod\"}",
              "legendFormat": "Stack {{pod}}",
              "refId": "C"
            }
          ],
          "title": "Memoria: RSS / Virtual / Stack",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 47},
          "id": 103,
          "title": "Validators: Resource Usage",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
