apiVersion: v1
kind: ConfigMap
metadata:
  name: taonode-guardian-consensus-health-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: taonode-guardian
    app.kubernetes.io/part-of: taonode-guardian
data:
  tng-consensus-health.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Real-time Bittensor node consensus health — Block Lag, Peer Count, Sync State.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "description": "Block lag per node over time. Spike > 100 = degraded sync; > 500 = critical.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineWidth": 2,
                "spanNulls": false,
                "thresholdsStyle": {"mode": "line+area"}
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 100},
                  {"color": "red", "value": 500}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "taonode_guardian_block_lag",
              "legendFormat": "{{node_name}}",
              "refId": "A"
            }
          ],
          "title": "Block Lag (blocks)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "description": "Current peer count per node. < 3 = warning; < 1 = isolated.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 50,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "orange", "value": 3},
                  {"color": "green", "value": 8}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 9},
          "id": 2,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showThresholdLabels": true,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "taonode_guardian_peer_count",
              "legendFormat": "{{node_name}}",
              "refId": "A"
            }
          ],
          "title": "Peer Count (latest)",
          "type": "gauge"
        },
        {
          "datasource": "Prometheus",
          "description": "Sync state per node. 1 = SYNCED, 2 = SYNCING, 3 = STALLED.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {
                    "1": {"color": "green",  "index": 0, "text": "SYNCED"},
                    "2": {"color": "yellow", "index": 1, "text": "SYNCING"},
                    "3": {"color": "red",    "index": 2, "text": "STALLED"}
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 2},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 9},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "taonode_guardian_sync_state",
              "legendFormat": "{{node_name}}",
              "refId": "A"
            }
          ],
          "title": "Sync State",
          "type": "stat"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["taonode-guardian", "consensus", "health", "prometheus"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "TaoNode Consensus & Health",
      "uid": "tng-consensus-health",
      "version": 1
    }
