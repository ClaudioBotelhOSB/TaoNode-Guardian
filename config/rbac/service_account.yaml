apiVersion: v1
kind: ServiceAccount
metadata:
  name: taonode-guardian-controller-manager
  namespace: taonode-guardian-system
  labels:
    app.kubernetes.io/name: taonode-guardian
    app.kubernetes.io/component: controller-manager
# The Operator SA must mount a token for the API server calls it makes.
# Workload pods (validators/miners) explicitly set automountServiceAccountToken: false
# via the StatefulSet spec — this setting does NOT cascade to pods.
automountServiceAccountToken: true
