apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: taonode-guardian-leader-election-role
  namespace: taonode-guardian-system
  labels:
    app.kubernetes.io/name: taonode-guardian
    app.kubernetes.io/component: rbac
rules:
  # controller-runtime v0.19+ uses Lease-based leader election exclusively.
  # ConfigMap-based election is NOT included: no ConfigMap permission means
  # this vector is closed if the SA is compromised.
  #
  # delete is intentionally absent: controller-runtime manages lease expiration
  # automatically — explicit delete is never needed.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # Events emitted by the leader-election library itself.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
