apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/name: taonode-guardian
    app.kubernetes.io/part-of: taonode-guardian
    control-plane: controller-manager
  name: taonode-guardian-controller-manager
  namespace: taonode-guardian-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taonode-guardian
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        checkov.io/skip1: "CKV_K8S_43=Image digest is pinned by the CI pipeline at release time"
        checkov.io/skip2: "CKV_K8S_38=controller-manager requires SA token for API server access"
      labels:
        app.kubernetes.io/name: taonode-guardian
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --leader-elect
        - --enable-webhooks=false
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        - --cluster-id=$(CLUSTER_ID)
        command:
        - /manager
        env:
        - name: CLUSTER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: CLICKHOUSE_TLS
          value: "false"
        - name: OLLAMA_ENDPOINT
          value: ""
        - name: OLLAMA_MODEL
          value: llama3.1:8b-instruct-q4_K_M
        - name: DEFAULT_NODE_IMAGE
          value: ghcr.io/opentensor/subtensor:latest
        - name: DR_INTERVAL
          value: 1h
        image: ghcr.io/claudiobotelhosb/taonode-guardian:v0.1.0
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: health-probe
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        name: manager
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health-probe
          protocol: TCP
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: health-probe
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsUser: 65532
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
        - mountPath: /secrets/clickhouse
          name: clickhouse-creds
          readOnly: true
      imagePullSecrets:
      - name: ghcr-login-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: taonode-guardian-controller-manager
      terminationGracePeriodSeconds: 30
      volumes:
      - name: webhook-certs
        secret:
          optional: true
          secretName: taonode-guardian-webhook-server-cert
      - name: clickhouse-creds
        secret:
          optional: true
          secretName: taonode-guardian-clickhouse
