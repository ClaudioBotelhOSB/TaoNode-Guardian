apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  labels:
    app.kubernetes.io/name: taonode-guardian-observability
    app.kubernetes.io/part-of: taonode-guardian
  annotations:
    # sync-wave "1" — runs alongside foundations; both bring up monitoring before
    # the operator (wave 2) so metrics are scraped from the first reconcile.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # ── Kubecost 2.x — FinOps cost allocation ────────────────────────────────
    # Requires >= 16 GB RAM (t3.xlarge). Exposes UI on port 9090.
    - repoURL: https://kubecost.github.io/cost-analyzer/
      chart: cost-analyzer
      targetRevision: "2.6.1"
      helm:
        releaseName: kubecost
        valuesObject:
          kubecostDeployment:
            queryServiceReplicas: 0
          prometheus:
            server:
              enabled: false
            nodeExporter:
              enabled: false
          global:
            prometheus:
              enabled: false
              fqdn: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
          service:
            type: LoadBalancer
            port: 9090
            targetPort: 9090

    # ── ServiceMonitor — TaoNode Guardian Operator ────────────────────────────
    - repoURL: https://github.com/ClaudioBotelhOSB/taonode-guardian
      targetRevision: main
      path: argocd/monitors

    # ── Grafana Dashboards (ConfigMap sidecar auto-import) ────────────────────
    - repoURL: https://github.com/ClaudioBotelhOSB/taonode-guardian
      targetRevision: main
      path: config/dashboards

  # ── Destination ─────────────────────────────────────────────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  # ── Sync policy ─────────────────────────────────────────────────────────────
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
