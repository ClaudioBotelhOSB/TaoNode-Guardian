apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  labels:
    app.kubernetes.io/name: taonode-guardian-observability
    app.kubernetes.io/part-of: taonode-guardian
  annotations:
    # sync-wave "1" — runs alongside foundations; both bring up monitoring before
    # the operator (wave 2) so metrics are scraped from the first reconcile.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # ── ServiceMonitor — TaoNode Guardian Operator ────────────────────────────
    # Monitors the controller-manager metrics endpoint on port 8080 (HTTP).
    # kube-prometheus-stack picks this up automatically via label selector on
    # any ServiceMonitor matching release=kube-prometheus-stack.
    - repoURL: https://github.com/ClaudioBotelhOSB/taonode-guardian
      targetRevision: main
      path: argocd/monitors

    # ── Grafana Dashboards (ConfigMap sidecar auto-import) ────────────────────
    # ConfigMaps labelled grafana_dashboard=1 are picked up by the Grafana
    # sidecar provisioner bundled with kube-prometheus-stack. No Grafana restart
    # required — the sidecar hot-reloads dashboards within ~30s of ConfigMap
    # creation. namespace: monitoring is declared in each manifest directly.
    - repoURL: https://github.com/ClaudioBotelhOSB/taonode-guardian
      targetRevision: main
      path: config/dashboards

  # ── Destination ─────────────────────────────────────────────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  # ── Sync policy ─────────────────────────────────────────────────────────────
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
