apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foundations
  namespace: argocd
  labels:
    app.kubernetes.io/name: taonode-guardian-foundations
    app.kubernetes.io/part-of: taonode-guardian
  annotations:
    # sync-wave "1" — foundations must be healthy before the operator (wave 2)
    # or the data-plane (wave 3) are synced.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # ── Multiple sources (ArgoCD >= 2.6) ─────────────────────────────────────
  # Each source is an independent Helm chart or Git path.
  # The destination.namespace is the install namespace for Helm releases.
  # Per-chart namespace overrides are applied via valuesObject where supported.
  sources:

    # ── cert-manager ────────────────────────────────────────────────────────
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.16.1
      helm:
        releaseName: cert-manager
        valuesObject:
          # Install CRDs as part of the Helm release so ArgoCD tracks their lifecycle.
          installCRDs: true
          global:
            leaderElection:
              namespace: cert-manager
          # Restrict cert-manager to the taonode-guardian-system namespace for webhooks.
          extraArgs:
            - --namespace=cert-manager
            - --cluster-resource-namespace=cert-manager

    # ── kube-prometheus-stack (Prometheus + Grafana) ─────────────────────────
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "65.8.1"
      helm:
        releaseName: kube-prometheus-stack
        valuesObject:
          nameOverride: kube-prometheus-stack
          namespaceOverride: monitoring
          grafana:
            namespaceOverride: monitoring
            service:
              type: LoadBalancer
              port: 80
              targetPort: 3000
            # Password is sourced from a secret created by bootstrap.sh.
            # To rotate: kubectl create secret generic grafana-admin-secret \
            #   -n monitoring --from-literal=admin-password=<new> --dry-run=client -o yaml | kubectl apply -f -
            # Then: helm upgrade --reuse-values kube-prometheus-stack ...
            admin:
              existingSecret: grafana-admin-secret
              userKey: admin-user
              passwordKey: admin-password
          prometheus:
            prometheusSpec:
              scrapeInterval: 30s
              evaluationInterval: 30s
          alertmanager:
            enabled: true

    # ── Ollama — disabled on t3.medium (4 GB RAM insuficiente) ─────────────────
    # Re-habilitar ao migrar para instancia com >= 16 GB RAM (ex: t3.2xlarge).
    # - repoURL: https://otwld.github.io/ollama-helm/
    #   chart: ollama
    #   targetRevision: "0.72.0"

  # ── Destination ───────────────────────────────────────────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  # ── Sync policy ───────────────────────────────────────────────────────────
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # Helm CRDs installed by cert-manager must not be replaced on diff.
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # ── Ignore cert-manager CRD status fields (always drifting) ──────────────
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
        - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
