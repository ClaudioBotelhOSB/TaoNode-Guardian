name: Security

# ─────────────────────────────────────────────────────────────────────────────
# DEFENSE IN DEPTH — Esteira de Segurança
# ─────────────────────────────────────────────────────────────────────────────
# Arquitetura de jobs (todos paralelos — falham de forma independente):
#
#   ┌─────────────────────────────────────────────────────────────────────┐
#   │  gitleaks  │  gosec  │  checkov  │  trivy-image  │  trivy-fs       │
#   └─────────────────────────────────────────────────────────────────────┘
#
# Quando roda:
#   • Push → main          (qualquer arquivo)
#   • Pull Request → main  (qualquer arquivo)
#
# Resultado: PRs com falha de segurança ficam bloqueados para merge.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read         
  security-events: write 
  actions: read          

env:
  GO_VERSION: '1.23.0'
  IMAGE: ghcr.io/claudiobotelhosb/taonode-guardian:ci-scan-${{ github.sha }}

# ── 1. GITLEAKS ──────────────────────────────────────────────────────────────
jobs:
  gitleaks:
    name: "🔑 Gitleaks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} 

# ── 2. GOSEC ────────────────────────────────────────────────────────────────
  gosec:
    name: "🛡️ Gosec"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: >-
            -fmt sarif
            -out gosec-results.sarif
            -stdout
            -verbose=text
            -severity medium
            ./...

      - name: Upload SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()   
        with:
          sarif_file: gosec-results.sarif
          category: gosec

# ── 3. CHECKOV ──────────────────────────────────────────────────────────────
  checkov:
    name: "☁️ Checkov"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: kubernetes,dockerfile,github_actions,secrets
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false

      - name: Upload SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

# ── 4. TRIVY (Dockerfile + Filesystem) ──────────────────────────────────────
  trivy:
    name: "🐳 Trivy"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true             
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy — Scan Docker image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true        
          vuln-type: os,library

      - name: Upload image scan SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Trivy — Scan Go dependencies (filesystem)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        if: success() || failure()
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: library

      - name: Upload filesystem scan SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem
