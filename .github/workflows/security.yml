name: Security

# ─────────────────────────────────────────────────────────────────────────────
# DEFENSE IN DEPTH — Esteira de Segurança
# ─────────────────────────────────────────────────────────────────────────────
# Arquitetura de jobs (todos paralelos — falham de forma independente):
#
#   ┌─────────────────────────────────────────────────────────────────────┐
#   │  gitleaks  │  gosec  │  checkov  │  trivy-image  │  trivy-fs       │
#   └─────────────────────────────────────────────────────────────────────┘
#
# Quando roda:
#   • Push → main          (qualquer arquivo)
#   • Pull Request → main  (qualquer arquivo)
#
# Resultado: PRs com falha de segurança ficam bloqueados para merge.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read         # Leitura do repositório
  security-events: write # Publicar alertas no GitHub Security tab (SARIF)

env:
  GO_VERSION: '1.23.0'
  IMAGE: ghcr.io/claudiobotelhosb/taonode-guardian:ci-scan-${{ github.sha }}

# ── 1. GITLEAKS ──────────────────────────────────────────────────────────────
# Defense in Depth: garante que ninguém fez git commit --no-verify no hook local.
jobs:
  gitleaks:
    name: "🔑 Gitleaks — Secret Scanner"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (com histórico completo para diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Necessário para o Gitleaks escanear todo o histórico do PR

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Descomente se usar a versão Pro

# ── 2. GOSEC ────────────────────────────────────────────────────────────────
# Análise estática de segurança (SAST) do código Go.
# Detecta: SQL Injection, criptografia fraca, permissões de arquivo inseguras,
# variáveis de ambiente lidas sem sanitização, etc.
  gosec:
    name: "🛡️ Gosec — Go SAST"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          # Saída em SARIF para integrar com o GitHub Security tab
          # e em texto para facilitar leitura no log do CI
          args: >-
            -fmt sarif
            -out gosec-results.sarif
            -stdout
            -verbose=text
            -severity medium
            ./...

      - name: Upload SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # Submete mesmo se o Gosec falhou (para ver os alertas)
        with:
          sarif_file: gosec-results.sarif
          category: gosec

# ── 3. CHECKOV ──────────────────────────────────────────────────────────────
# Varredura de IaC e Kubernetes manifests.
# Detecta: containers rodando como root, sem limites de CPU/RAM,
# imagens sem tag de versão, RBAC excessivo, privilégios elevados, etc.
  checkov:
    name: "☁️ Checkov — IaC & K8s Scanner"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          # Escaneia todos os diretórios relevantes do projeto
          directory: .
          # Frameworks a verificar
          framework: kubernetes,dockerfile,github_actions,secrets
          # Saída em SARIF para GitHub Security tab
          output_format: sarif
          output_file_path: checkov-results.sarif
          # Não quebrar o build em soft-fail — apenas reportar
          # Remova a linha abaixo para tornar o job blocking em falhas altas
          soft_fail: false
          # Ignora regras conhecidas como aceitas no projeto (adicione conforme necessário)
          # skip_check: CKV_K8S_14,CKV_K8S_28

      - name: Upload SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

# ── 4. TRIVY (Dockerfile + Filesystem) ──────────────────────────────────────
# Varredura de CVEs em dependências Go, imagem Docker e sistema de arquivos.
# Trivy é pesado (baixa banco de CVEs ~200MB) — ideal no CI, nunca local.
  trivy:
    name: "🐳 Trivy — CVE & Image Scanner"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── 4a. Build da imagem local apenas para escaneamento ─────────────────
      # Não faz push. Serve apenas como alvo do Trivy.
      - name: Build Docker image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true             # Carrega no daemon local do Docker
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── 4b. Escanear a IMAGEM (Alpine base + binário Go compilado) ─────────
      - name: Trivy — Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          # Quebra o build em vulnerabilidades CRÍTICAS
          exit-code: '1'
          ignore-unfixed: true        # Ignora CVEs sem patch disponível
          vuln-type: os,library

      - name: Upload image scan SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      # ─── 4c. Escanear o FILESYSTEM (módulos Go: go.mod / go.sum) ────────────
      - name: Trivy — Scan Go dependencies (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: library

      - name: Upload filesystem scan SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem
