name: CI

# Dependency graph:
#
#   lint ──────────┐
#                  ├── build-and-push ──┬── sign
#   test ──────────┘   (main only push)  └── provenance

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/claudiobotelhosb/taonode-guardian
  GO_VERSION: '1.23.0'
  GOLANGCI_LINT_VERSION: 'v1.61.0'
  ENVTEST_K8S_VERSION: '1.31.0'
  ENVTEST_BIN_DIR: ${{ github.workspace }}/.cache/kubebuilder-envtest

jobs:
  # ── 1. LINT ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  # ── 2. TEST ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Cache envtest binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.ENVTEST_BIN_DIR }}
          key: envtest-${{ runner.os }}-${{ env.ENVTEST_K8S_VERSION }}

      # setup-envtest é um sub-módulo independente desde controller-runtime v0.19.
      # Não possui tags semver — usa pseudo-versões (v0.0.0-*).
      # @latest resolve para o commit mais recente do sub-módulo.
      - name: Install envtest tools
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
        env:
          GOPROXY: "https://proxy.golang.org,direct"
          GOTOOLCHAIN: "local"

      - name: Provision envtest assets
        shell: bash
        run: |
          mkdir -p "$ENVTEST_BIN_DIR"
          setup-envtest use "${ENVTEST_K8S_VERSION}" --bin-dir "$ENVTEST_BIN_DIR"
          ENVTEST_ASSETS="$(setup-envtest use -i -p path "${ENVTEST_K8S_VERSION}" --bin-dir "$ENVTEST_BIN_DIR")"
          echo "KUBEBUILDER_ASSETS=${ENVTEST_ASSETS}" >> "$GITHUB_ENV"

      - name: Run tests
        run: go test ./... -coverprofile=cover.out -count=1

  # ── 3. BUILD & PUSH ────────────────────────────────────────────────────────
  # Depende diretamente de lint e test (sem job de qualidade intermediário).
  # Build linux/amd64 apenas — arm64 removido para eliminar timeouts do QEMU.
  # Push e provenance ativados somente em push para main.
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/claudiobotelhosb/taonode-guardian
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          sbom: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

  # ── 4. SIGN & ATTEST ───────────────────────────────────────────────────────
  sign:
    name: Sign & Attest
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/claudiobotelhosb/taonode-guardian@${{ needs.build-and-push.outputs.digest }}
          artifact-name: sbom.spdx.json
          output-file: sbom.spdx.json
          format: spdx-json

      - name: Attest SBOM with Cosign
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }}

  # ── 5. SLSA PROVENANCE (L3) ────────────────────────────────────────────────
  provenance:
    name: SLSA Provenance (L3)
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/claudiobotelhosb/taonode-guardian
      digest: ${{ needs.build-and-push.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
