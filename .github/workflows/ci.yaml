name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write # required for Cosign OIDC keyless + SLSA provenance

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/claudiobotelhosb/taonode-guardian
  GO_VERSION: '1.23.0'
  ENVTEST_K8S_VERSION: '1.31.0'

jobs:
  # ── 1. LINT (fail-fast, blocks build) ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ── 2. TEST (parallel with lint, envtest binaries cached) ──────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache envtest binaries
        id: envtest-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/kubebuilder
          key: envtest-${{ env.ENVTEST_K8S_VERSION }}-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            envtest-${{ env.ENVTEST_K8S_VERSION }}-${{ runner.os }}-

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

      - name: Provision envtest assets (k8s ${{ env.ENVTEST_K8S_VERSION }})
        run: |
          setup-envtest use ${{ env.ENVTEST_K8S_VERSION }} --bin-dir /usr/local/bin
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use -i -p path ${{ env.ENVTEST_K8S_VERSION }} --bin-dir /usr/local/bin)" >> $GITHUB_ENV

      - name: Run tests
        run: make test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover.out
          retention-days: 7

  # ── 3. BUILD & SECURITY (gates on lint + test passing) ─────────────────────
  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single-arch local build for scanning — runs on both PR and push
      - name: Build image for scanning (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE }}:scan-${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (SARIF → Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:scan-${{ github.run_id }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # Production multi-arch build + push — main branch only
      - name: Extract Docker metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push multi-arch image (amd64 + arm64)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ── 4. SIGN & ATTEST (main branch only) ────────────────────────────────────
  sign:
    name: Sign & Attest
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with Cosign (OIDC keyless)
        run: |
          cosign sign --yes \
            ghcr.io/claudiobotelhosb/taonode-guardian@${{ needs.build.outputs.digest }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/claudiobotelhosb/taonode-guardian@${{ needs.build.outputs.digest }}
          artifact-name: sbom.spdx.json
          output-file: sbom.spdx.json
          format: spdx-json

      - name: Attest SBOM with Cosign
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ghcr.io/claudiobotelhosb/taonode-guardian@${{ needs.build.outputs.digest }}

  # ── 5. SLSA PROVENANCE L3 (main branch only, reusable workflow) ────────────
  provenance:
    name: SLSA Provenance (L3)
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/claudiobotelhosb/taonode-guardian
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
